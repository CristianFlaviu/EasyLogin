services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: easylogin-db
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" -b
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./src/EasyLoginAPI
      dockerfile: EasyLoginAPI/Dockerfile
    container_name: easylogin-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "8080:8080"

  frontend:
    build: ./src/EasyLoginUI
    container_name: easylogin-frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  sqldata:
