<mat-toolbar class="navbar" color="primary">
  <a mat-button routerLink="/dashboard" class="brand">
    <mat-icon class="brand-icon">lock</mat-icon>
    <span>EasyLogin</span>
  </a>

  <span class="nav-divider"></span>

  <a mat-button routerLink="/dashboard" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
    Dashboard
  </a>

  <!-- SuperAdmin nav -->
  <a mat-button routerLink="/superadmin/tenants" routerLinkActive="active-link" *appHasRole="'SuperAdmin'">
    Tenants
  </a>
  <a mat-button routerLink="/superadmin/users" routerLinkActive="active-link" *appHasRole="'SuperAdmin'">
    Users
  </a>
  <a mat-button routerLink="/superadmin/roles" routerLinkActive="active-link" *appHasRole="'SuperAdmin'">
    System Roles
  </a>

  <!-- TenantAdmin nav -->
  <a mat-button routerLink="/tenant/users" routerLinkActive="active-link" *appHasRole="'TenantAdmin'">
    Tenant Users
  </a>
  <a mat-button routerLink="/tenant/roles" routerLinkActive="active-link" *appHasRole="'TenantAdmin'">
    Tenant Roles
  </a>

  <span class="spacer"></span>

  @if (auth.currentUser$ | async; as user) {
    <button mat-icon-button class="user-menu-trigger" [matMenuTriggerFor]="userMenu" matTooltip="Account" aria-label="Open user menu">
      <span class="user-avatar">{{ user.firstName.charAt(0) }}{{ user.lastName.charAt(0) }}</span>
    </button>

    <mat-menu #userMenu="matMenu" xPosition="before">
      <div class="menu-profile" aria-hidden="true">
        <div class="menu-avatar">{{ user.firstName.charAt(0) }}{{ user.lastName.charAt(0) }}</div>
        <div class="menu-copy">
          <div class="menu-name">{{ user.firstName }} {{ user.lastName }}</div>
          <div class="menu-email">{{ user.email }}</div>
        </div>
      </div>
      <a mat-menu-item routerLink="/profile">
        <mat-icon>account_circle</mat-icon>
        <span>Profile</span>
      </a>
      <button mat-menu-item (click)="auth.logout()">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  }
</mat-toolbar>
