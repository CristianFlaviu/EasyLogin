@if (submitted) {
  <h2 class="screen-title">Check your email</h2>
  <p class="screen-subtitle">Confirm your email address before signing in.</p>
  <a mat-flat-button color="primary" class="full-width submit-btn" routerLink="/login">Back to sign in</a>
} @else {
  <h2 class="screen-title">Create account</h2>
  <p class="screen-subtitle">Use your email address to create an EasyLogin account</p>

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="name-grid">
      <mat-form-field appearance="outline">
        <mat-label>First name</mat-label>
        <input matInput formControlName="firstName" autocomplete="given-name">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Last name</mat-label>
        <input matInput formControlName="lastName" autocomplete="family-name">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Email address</mat-label>
      <input matInput formControlName="email" type="email" autocomplete="email">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Password</mat-label>
      <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'" autocomplete="new-password">
      <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
        <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Confirm password</mat-label>
      <input matInput formControlName="confirmPassword" type="password" autocomplete="new-password">
    </mat-form-field>

    <button mat-flat-button color="primary" class="full-width submit-btn"
            [disabled]="form.invalid || loading" type="submit">
      @if (loading) {
        <mat-spinner diameter="20" />
      } @else {
        Register
      }
    </button>
  </form>
}
