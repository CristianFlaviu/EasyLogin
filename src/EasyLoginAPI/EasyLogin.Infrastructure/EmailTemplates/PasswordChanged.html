<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
    .alert { background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 12px 16px; margin: 16px 0; }
    .footer { margin-top: 24px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h2>Password Changed</h2>
  <p>The password for <strong>{{email}}</strong> was successfully changed.</p>
  <div class="alert">If you did not make this change, contact support immediately and reset your password.</div>
  <div class="footer">EasyLogin &mdash; This is an automated message, please do not reply.</div>
</body>
</html>
