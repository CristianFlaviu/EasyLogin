<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
    .highlight { color: #4a6cf7; font-weight: bold; }
    .footer { margin-top: 24px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h2>Welcome to EasyLogin, {{firstName}}!</h2>
  <p>Your account has been created successfully.</p>
  <p>You can sign in using your email address: <span class="highlight">{{email}}</span></p>
  <p>If you did not create this account, please contact support immediately.</p>
  <div class="footer">EasyLogin &mdash; This is an automated message, please do not reply.</div>
</body>
</html>
