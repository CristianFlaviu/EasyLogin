<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
    .button { display: inline-block; padding: 12px 18px; background: #1565c0; color: #fff; text-decoration: none; border-radius: 6px; }
    .footer { margin-top: 24px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h2>Confirm your email</h2>
  <p>Hello {{firstName}},</p>
  <p>Confirm your email address to finish setting up your EasyLogin account.</p>
  <p><a class="button" href="{{confirmationUrl}}">Confirm email</a></p>
  <p>If you did not create this account, you can ignore this message.</p>
  <div class="footer">EasyLogin &mdash; This is an automated message, please do not reply.</div>
</body>
</html>
