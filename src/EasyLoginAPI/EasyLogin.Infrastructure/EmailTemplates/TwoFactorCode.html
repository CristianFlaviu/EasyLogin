<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 20px; }
    .code { display: inline-block; padding: 12px 16px; border: 1px solid #d9e2ef; border-radius: 6px; font-size: 28px; letter-spacing: 6px; font-weight: bold; }
    .footer { margin-top: 24px; font-size: 12px; color: #888; }
  </style>
</head>
<body>
  <h2>Your verification code</h2>
  <p>Hello {{firstName}},</p>
  <p>Use this code to finish signing in to EasyLogin.</p>
  <p class="code">{{code}}</p>
  <p>This code expires in {{minutes}} minutes.</p>
  <p>If you did not request this code, change your password or contact your administrator.</p>
  <div class="footer">EasyLogin &mdash; This is an automated message, please do not reply.</div>
</body>
</html>
