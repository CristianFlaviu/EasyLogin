services:
  mailhog:
    image: mailhog/mailhog
    container_name: easylogin-mailhog
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Email__Provider=Smtp
      - Email__SmtpHost=mailhog
      - Email__SmtpPort=1025
    depends_on:
      - mailhog
